name: Build SWO POS APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle wrapper
        run: |
          gradle wrapper --gradle-version=8.4 --distribution-type=bin
        working-directory: .

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Generate keystore (if not provided via secrets)
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            keytool -genkeypair \
              -alias swopos \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -keystore app/keystore.jks \
              -storepass swopos2026 \
              -keypass swopos2026 \
              -dname "CN=SWO POS, OU=Riser Technologies, O=SWO, L=Dubai, S=Dubai, C=AE" \
              -noprompt
            echo "KEYSTORE_PATH=keystore.jks" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=swopos2026" >> $GITHUB_ENV
            echo "KEY_ALIAS=swopos" >> $GITHUB_ENV
            echo "KEY_PASSWORD=swopos2026" >> $GITHUB_ENV
          else
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.jks
            echo "KEYSTORE_PATH=keystore.jks" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          fi

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ env.KEY_ALIAS }}
          KEY_PASSWORD: ${{ env.KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: swo-pos-release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
