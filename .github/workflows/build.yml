name: Build SWO POS APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -alias swopos \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore app/keystore.jks \
            -storepass swopos2026 \
            -keypass swopos2026 \
            -dname "CN=SWO POS, OU=Riser, O=SWO, L=Dubai, S=Dubai, C=AE" \
            -noprompt

      - name: Build Release APK
        run: gradle assembleRelease
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: swopos2026
          KEY_ALIAS: swopos
          KEY_PASSWORD: swopos2026

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: swo-pos-release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
